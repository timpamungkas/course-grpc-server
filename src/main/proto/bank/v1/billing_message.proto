syntax = "proto3";

package bank.v1;

option java_package = "com.course.central.proto.bank";

message PayBillRequest {
  string from_account_number = 1 [json_name = "from_account_number"];
  string biller_code = 2 [json_name = "biller_code"];
  string currency = 3 [json_name = "currency"];
  double payment_amount = 4 [json_name = "payment_amount"];
}

message PayBillResponse {
  string payment_id = 1 [json_name = "payment_id"];
  string reference_number = 2 [json_name = "reference_number"];
  bool success = 3 [json_name = "success"];
}