spring:
  application:
    name: grpcserver
  main:
    banner-mode: off
  grpc:
    server:
      health:
        enabled: true
      reflection:
        enabled: true
    client:
      channels:
        default-channel:
          address: "localhost:9090"
          negotiation-type: plaintext
  datasource:
    url: jdbc:h2:file:./grpc.h2.db;AUTO_SERVER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password: ""
  h2:
    console:
      enabled: true     
      
armeria:
  ports:
    - port: 8888
      protocols:
        - HTTP

logging:
  level:
    io.grpc.netty: WARN
  pattern:
    console: "%clr(%d{HH:mm:ss.SSS}){faint} %clr(%-5level) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n"
