spring:
  application:
    name: grpcserver
  main:
    banner-mode: off
  grpc:
    server:
      health:
        enabled: true
      reflection:
        enabled: true

# Armeria HTTP server — exposes gRPC services as REST/JSON
# Unary methods are reachable via:
#   POST http://localhost:8080/<package>.<Service>/<Method>
#   Content-Type: application/json
armeria:
  ports:
    - port: 8080
      protocols:
        - HTTP

logging:
  level:
    io.grpc.netty: WARN
  pattern:
    console: "%clr(%d{HH:mm:ss.SSS}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}"
